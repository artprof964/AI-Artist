name: ai-artist

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_artist
      POSTGRES_USER: ai_artist
      POSTGRES_PASSWORD: ai_artist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_artist -d ai_artist"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-lc", "</dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ai_artist
      MINIO_ROOT_PASSWORD: ai_artist_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.70.0
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --set=decision_logs.console=true
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./policies/opa:/policies:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-artist-backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m backend.cli serve --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://ai_artist:ai_artist@postgres:5432/ai_artist
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      REDIS_URL: redis://redis:6379/0
      OPA_URL: http://opa:8181
      SAFETY_SERVICE_URL: http://ai-artist-backend:8000
      LLM_API_URL: ${LLM_API_URL:-https://api.deepseek.com}
      LLM_PRIMARY_MODEL: ${LLM_PRIMARY_MODEL:-deepseek-v4-pro}
      deepseek-open-art: ${DEEPSEEK_OPEN_ART:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AUDIT_REPOSITORY: ${AUDIT_REPOSITORY:-memory}
      GIT_REPOS_ROOT: /git_repos
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: C:\Users\fredo\git_repos
        target: /git_repos
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_healthy

  thestone_01-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python /agent_runtime/scripts/thestone_01_service.py
    working_dir: /agent_runtime
    environment:
      PYTHONPATH: /agent_runtime/src:/harness/src
      THESTONE_01_AGENT_ROOT: /agent_runtime/agents/thestone_01
      THESTONE_01_SERVICE_ROOT: /tmp/thestone_01_service
      THESTONE_01_MODEL: deepseek-v4-pro
      THESTONE_01_AGENT_DATA_STORAGE: postgres
      THESTONE_01_DATABASE_URL: postgresql://ai_artist:ai_artist@postgres:5432/ai_artist
      tele_thestone_01: ${tele_thestone_01:?tele_thestone_01 is required for thestone_01-bot}
      deepseek-open-art: ${DEEPSEEK_OPEN_ART:?DEEPSEEK_OPEN_ART is required for thestone_01-bot}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GIT_REPOS_ROOT: /git_repos
    volumes:
      - type: bind
        source: C:\Users\fredo\git_repos
        target: /git_repos
        read_only: true
      - type: bind
        source: C:\Users\fredo\git_repos\agent_runtime_maraca
        target: /agent_runtime
        read_only: true
      - type: bind
        source: C:\Users\fredo\git_repos\Harness_age_mem_v02
        target: /harness
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
