name: T24 Safety Unit CI

on:
  pull_request:
  push:

jobs:
  safety-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run safety unit coverage gate
        run: >
          python -m pytest
          -p no:cacheprovider
          --cov=backend.app
          --cov=backend.audit
          --cov=backend.response_cache
          --cov=backend.schemas
          --cov=backend.service
          --cov=backend.source_freshness
          --cov-report=term-missing
          --cov-fail-under=90
          tests/test_safety_service_units.py
          tests/test_safety_service_endpoints.py
          tests/test_opa_policy.py
          tests/test_response_cache.py
          tests/test_source_freshness.py
          tests/test_audit_event_log.py

      - name: Run lint
        run: python -m ruff check .
